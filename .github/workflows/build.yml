name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # リリース作成に必要
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/texlive-action@v2
        with:
          scheme: full
          run: |
            apk add --no-cache zsh
            zsh utility/compile.sh

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pandoc zip

      - name: Fix build directory permissions
        run: sudo chown -R "$(whoami)" build/

      - name: Convert to Markdown
        run: python3 utility/tex2md.py

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: main.pdf
          path: build/main.pdf

      - name: Upload Markdown artifact
        uses: actions/upload-artifact@v4
        with:
          name: main.md
          path: build/main.md

      - name: Compute version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release archive
        run: zip -j build/release.zip build/main.pdf build/main.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: build/release.zip
          generate_release_notes: true