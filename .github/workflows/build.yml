name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # リリース作成に必要
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/texlive-action@v2
        with:
          scheme: full
          run: |
            apk add --no-cache zsh
            zsh utility/compile.sh

      - name: Install pandoc
        run: sudo apt-get install -y --no-install-recommends pandoc

      - name: Fix build directory permissions
        run: sudo chown -R "$USER" build/

      - name: Convert to Markdown
        run: python3 utility/tex2md.py

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: main.pdf
          path: build/main.pdf

      - name: Upload Markdown artifact
        uses: actions/upload-artifact@v4
        with:
          name: main.md
          path: build/main.md

      - name: Create release archive
        if: startsWith(github.ref, 'refs/tags/')
        run: zip -j build/release.zip build/main.pdf build/main.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/release.zip
          generate_release_notes: true